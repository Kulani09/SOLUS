<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Solus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="Solus.html" class="logo">Solus<span>.</span></a>
      <h1>Create Account</h1>
      <p class="form-note">Register to save your cart, view orders, and manage your Solus profile.</p>
      <form id="registerForm" class="form-grid" autocomplete="off">
        <div class="form-group"><label for="name">Full Name</label><input id="name" name="solus_signup_name" type="text" value="" autocomplete="off" required></div>
        <div class="form-group"><label for="email">Email</label><input id="email" name="solus_signup_email" type="email" value="" autocomplete="off" required></div>
        <div class="form-group"><label for="phone">Phone Number</label><input id="phone" name="solus_signup_phone" type="text" value="" autocomplete="off" required></div>
        <div class="form-group"><label for="password">Password</label><input id="password" name="solus_signup_password" type="password" value="" autocomplete="new-password" required></div>
        <button class="btn primary wfull" type="submit">Create Account</button>
        <p class="small">Already have an account? <a class="link" href="login.html">Sign in</a></p>
      </form>
    </section>
  </main>
  <script src="site.js"></script>
</body>
</html>
