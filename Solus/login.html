<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Solus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="Solus.html" class="logo">Solus<span>.</span></a>
      <h1>Sign In</h1>
      <p class="form-note">Use your email and password to continue.</p>
      <form id="loginForm" class="form-grid">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••" minlength="6" required>
        </div>
        <button class="btn primary wfull" type="submit">Sign In</button>
        <p class="small">No account? <a class="link" href="register.html">Create one</a></p>
      </form>
    </section>
  </main>
  <script src="site.js"></script>
</body>
</html>
